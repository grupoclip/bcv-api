name: Deploy Worker

on:
  push:
    branches: [ main ]
    paths:
      - "workers/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Cloudflare Worker
        env:
          CF_WORKERS_API_TOKEN: ${{ secrets.CF_WORKERS_API_TOKEN }}
          WRANGLER_SEND_METRICS: "false"
        run: |
          if [ -z "${CF_WORKERS_API_TOKEN}" ]; then
            echo "Missing CF_WORKERS_API_TOKEN secret."
            echo "Create a Cloudflare API token with Account Workers Scripts:Edit, Zone Workers Routes:Edit, and Zone:Read."
            exit 1
          fi

          export CLOUDFLARE_API_TOKEN="${CF_WORKERS_API_TOKEN}"
          npx --yes wrangler@4 deploy --config wrangler.toml
