name: Deploy site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Preserve raw Agent Skills artifacts
        run: cp -R .well-known/agent-skills/. _site/.well-known/agent-skills/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Configure Cloudflare agent discovery Link headers
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_RULES_API_TOKEN: ${{ secrets.CF_RULES_API_TOKEN }}
          RULE_REF: bcv-agent-discovery-link-headers
          RULE_DESCRIPTION: BCV Today agent discovery Link headers
          RULE_EXPRESSION: '(http.host eq "bcv.today" and http.request.uri.path eq "/")'
          LINK_HEADER: >-
            </.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json",
            </openapi.json>; rel="service-desc"; type="application/vnd.oai.openapi+json",
            </api/>; rel="service-doc"; type="text/html",
            </llms.txt>; rel="describedby"; type="text/plain",
            </.well-known/agent-card.json>; rel="describedby"; type="application/json",
            </.well-known/agent-skills/index.json>; rel="describedby"; type="application/json"
        run: |
          if [ -z "${CF_ZONE_ID}" ] || [ -z "${CF_RULES_API_TOKEN}" ]; then
            echo "Cloudflare ruleset secrets are not configured; skipping Link header rule."
            echo "Add CF_RULES_API_TOKEN with Cloudflare Zone:Read and Zone Rulesets:Edit permissions."
            exit 0
          fi

          phase="http_response_headers_transform"
          api_base="https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets"
          response="$(mktemp)"
          payload="$(mktemp)"

          status="$(curl --show-error --silent \
            --output "${response}" \
            --write-out "%{http_code}" \
            -H "Authorization: Bearer ${CF_RULES_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${api_base}/phases/${phase}/entrypoint")"

          rule="$(jq -n \
            --arg ref "${RULE_REF}" \
            --arg description "${RULE_DESCRIPTION}" \
            --arg expression "${RULE_EXPRESSION}" \
            --arg link "${LINK_HEADER}" \
            '{
              ref: $ref,
              description: $description,
              expression: $expression,
              action: "rewrite",
              action_parameters: {
                headers: {
                  Link: {
                    operation: "set",
                    value: $link
                  }
                }
              },
              enabled: true
            }')"

          if [ "${status}" = "404" ]; then
            jq -n \
              --argjson rule "${rule}" \
              '{
                name: "BCV Today response header transforms",
                kind: "zone",
                phase: "http_response_headers_transform",
                rules: [$rule]
              }' > "${payload}"

            curl --fail --show-error --silent \
              -X POST "${api_base}" \
              -H "Authorization: Bearer ${CF_RULES_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @"${payload}"
            exit 0
          fi

          if [ "${status}" = "401" ] || [ "${status}" = "403" ]; then
            cat "${response}"
            echo
            echo "Cloudflare refused CF_RULES_API_TOKEN. Recreate it with Zone:Read and Zone Rulesets:Edit for this zone."
            exit 1
          fi

          if [ "${status}" != "200" ]; then
            cat "${response}"
            exit 1
          fi

          ruleset_id="$(jq -r '.result.id' "${response}")"
          jq \
            --arg ref "${RULE_REF}" \
            --arg description "${RULE_DESCRIPTION}" \
            --argjson rule "${rule}" \
            '.result as $ruleset |
              {
                name: $ruleset.name,
                description: ($ruleset.description // ""),
                kind: $ruleset.kind,
                phase: $ruleset.phase,
                rules: ((($ruleset.rules // [])
                  | map(select(.ref != $ref and .description != $description)))
                  + [$rule])
              }' "${response}" > "${payload}"

          curl --fail --show-error --silent \
            -X PUT "${api_base}/${ruleset_id}" \
            -H "Authorization: Bearer ${CF_RULES_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @"${payload}"

      - name: Configure Cloudflare Markdown for Agents
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_RULES_API_TOKEN: ${{ secrets.CF_RULES_API_TOKEN }}
          RULE_REF: bcv-markdown-for-agents
          RULE_DESCRIPTION: BCV Today Markdown for Agents
          RULE_EXPRESSION: '(http.host eq "bcv.today")'
        run: |
          if [ -z "${CF_ZONE_ID}" ] || [ -z "${CF_RULES_API_TOKEN}" ]; then
            echo "Cloudflare ruleset secrets are not configured; skipping Markdown for Agents rule."
            echo "Add CF_RULES_API_TOKEN with Cloudflare Zone:Read and Zone Rulesets:Edit permissions."
            exit 0
          fi

          phase="http_config_settings"
          entrypoint_url="https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/rulesets/phases/${phase}/entrypoint"
          payload="$(mktemp)"
          response="$(mktemp)"

          jq -n \
            --arg description "${RULE_DESCRIPTION}" \
            --arg expression "${RULE_EXPRESSION}" \
            '{
              rules: [{
                expression: $expression,
                action: "set_config",
                action_parameters: {
                  content_converter: true
                },
                description: $description
              }]
            }' > "${payload}"

          status="$(curl --show-error --silent \
            --output "${response}" \
            --write-out "%{http_code}" \
            --request PUT \
            --url "${entrypoint_url}" \
            -H "Authorization: Bearer ${CF_RULES_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @"${payload}")"

          if [ "${status}" = "401" ] || [ "${status}" = "403" ]; then
            cat "${response}"
            echo
            echo "Cloudflare refused CF_RULES_API_TOKEN. Recreate it with Zone:Read and Zone Rulesets:Edit for this zone."
            exit 1
          fi

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            cat "${response}"
            exit 1
          fi

          cat "${response}"

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "${CF_ZONE_ID}" ] || [ -z "${CF_API_TOKEN}" ]; then
            echo "Cloudflare secrets are not configured; skipping cache purge."
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
