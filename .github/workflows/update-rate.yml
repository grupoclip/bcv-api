name: Update BCV rate

on:
  schedule:
    # Every 30 minutes. BCV publishes around 16:30 Venezuela (20:30 UTC) on
    # business days; running often catches the publish quickly, recovers from
    # any missed run, and is a no-op (no commit) when nothing changed.
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/update-rate.yml"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch rate
        run: python main.py

      - name: Commit generated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api _data/rate.json _data/recent_usd.json
          if git diff --cached --quiet -- api _data/rate.json _data/recent_usd.json; then
            echo "No changes in generated data"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update rate"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pushes by GITHUB_TOKEN don't trigger other workflows, but
        # workflow_dispatch does — so we kick off the Pages deploy explicitly.
        run: gh workflow run pages.yml --ref main
