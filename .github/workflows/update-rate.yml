name: Update BCV rate

on:
  schedule:
    # 21:00 UTC = 17:00 Venezuela (UTC-4). BCV publishes the next day's rate
    # around 16:00 Venezuela, so this gives a ~1h buffer.
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/update-rate.yml"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch rate
        run: python main.py

      - name: Commit rate.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api
          if git diff --cached --quiet -- api; then
            echo "No changes in api/"
            exit 0
          fi
          git commit -m "chore: update rate"
          git push
