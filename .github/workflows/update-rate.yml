name: Update BCV rate

on:
  schedule:
    # 21:00 UTC = 17:00 Venezuela (UTC-4). BCV publishes around 16:30 on
    # business days; on weekends and holidays nothing new is posted, but we
    # still scrape so the history has an entry for every calendar day with
    # the rate that was officially in effect.
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/update-rate.yml"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch rate
        run: python main.py

      - name: Commit rate.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api
          if git diff --cached --quiet -- api; then
            echo "No changes in api/"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update rate"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pushes by GITHUB_TOKEN don't trigger other workflows, but
        # workflow_dispatch does — so we kick off the Pages deploy explicitly.
        run: gh workflow run pages.yml --ref main
