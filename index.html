<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BCV API · Tasas oficiales</title>
    <meta
      name="description"
      content="API JSON no oficial con las tasas oficiales del Banco Central de Venezuela: USD, EUR, CNY, TRY, RUB."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --panel: #121a33;
        --panel-2: #182242;
        --text: #e8ecf5;
        --muted: #9aa3bf;
        --accent: #ffd166;
        --border: #233056;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --panel: #ffffff;
          --panel-2: #f0f3fa;
          --text: #16213e;
          --muted: #5b6478;
          --accent: #b8860b;
          --border: #e3e8f3;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 24px 64px;
      }
      header {
        margin-bottom: 32px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }
      header p {
        margin: 0;
        color: var(--muted);
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        margin: 24px 0;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .meta strong {
        color: var(--text);
        font-weight: 600;
      }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        transition: transform 0.15s ease, border-color 0.15s ease;
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
      }
      .card .code {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .card .name {
        font-size: 0.95rem;
        margin: 4px 0 12px;
        color: var(--text);
      }
      .card .value {
        font-size: 1.6rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .card .unit {
        font-size: 0.85rem;
        color: var(--muted);
        margin-left: 4px;
      }
      section.endpoints {
        margin-top: 48px;
        padding: 24px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      section.endpoints h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }
      section.endpoints code {
        background: var(--panel);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      section.endpoints ul {
        margin: 0;
        padding-left: 18px;
      }
      section.endpoints li {
        margin: 6px 0;
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      footer {
        margin-top: 48px;
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
      }
      .error {
        padding: 16px;
        border-radius: 8px;
        background: rgba(255, 100, 100, 0.12);
        border: 1px solid rgba(255, 100, 100, 0.4);
        color: #ff8888;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>BCV API</h1>
        <p>
          Tasas oficiales del
          <a href="https://www.bcv.org.ve/" target="_blank" rel="noopener"
            >Banco Central de Venezuela</a
          >, actualizadas automáticamente.
        </p>
      </header>

      <div class="meta" id="meta"></div>
      <div class="grid" id="grid">
        <p>Cargando…</p>
      </div>

      <section class="endpoints">
        <h2>Endpoints</h2>
        <ul>
          <li>
            Tasa actual:
            <a href="./api/rate.json"><code>api/rate.json</code></a>
          </li>
          <li>
            Histórico:
            <code>api/history/&lt;YYYY-MM-DD&gt;.json</code>
          </li>
        </ul>
      </section>

      <footer>
        Proyecto no oficial ·
        <a
          href="https://github.com/grupoclip/bcv-api"
          target="_blank"
          rel="noopener"
          >Código fuente en GitHub</a
        >
      </footer>
    </main>

    <script>
      const CURRENCY_NAMES = {
        USD: "Dólar estadounidense",
        EUR: "Euro",
        CNY: "Yuan chino",
        TRY: "Lira turca",
        RUB: "Rublo ruso",
      };

      const formatRate = (n) =>
        new Intl.NumberFormat("es-VE", {
          minimumFractionDigits: 4,
          maximumFractionDigits: 8,
        }).format(n);

      const formatDateTime = (iso) =>
        new Intl.DateTimeFormat("es-VE", {
          dateStyle: "long",
          timeStyle: "short",
          timeZone: "America/Caracas",
        }).format(new Date(iso));

      const formatDate = (iso) =>
        new Intl.DateTimeFormat("es-VE", { dateStyle: "long" }).format(
          new Date(iso + "T12:00:00")
        );

      async function load() {
        const grid = document.getElementById("grid");
        const meta = document.getElementById("meta");
        try {
          const res = await fetch("./api/rate.json", { cache: "no-cache" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          meta.innerHTML = `
            <span>Fecha: <strong>${formatDate(data.date)}</strong></span>
            <span>Actualizado: <strong>${formatDateTime(
              data.updated_at
            )}</strong> (Caracas)</span>
          `;

          grid.innerHTML = "";
          for (const code of Object.keys(CURRENCY_NAMES)) {
            if (typeof data[code] !== "number") continue;
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <div class="code">${code}</div>
              <div class="name">${CURRENCY_NAMES[code]}</div>
              <div class="value">${formatRate(
                data[code]
              )}<span class="unit">Bs.</span></div>
            `;
            grid.appendChild(card);
          }
        } catch (err) {
          grid.innerHTML = `<div class="error">No se pudo cargar la tasa: ${err.message}</div>`;
        }
      }

      load();
    </script>
  </body>
</html>
